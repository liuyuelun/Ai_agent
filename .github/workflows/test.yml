name: 自动化测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 每天 8:00 定时跑（UTC 时间）
  schedule:
    - cron: "0 0 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行全量测试
        run: python run.py

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/

  # 验证 webapp 能正常启动
  webapp-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 初始化数据库并验证启动
        run: |
          python -c "from webapp.db import init_db; init_db()"
          timeout 5 python -m webapp.app &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/ | grep 200
          curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/testcases | grep 200
