<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}自动化测试平台{% endblock %}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f6fa; display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: linear-gradient(180deg, #2c3e50, #34495e); color: #fff; padding: 20px 0; flex-shrink: 0; }
  .sidebar .logo { font-size: 18px; font-weight: bold; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
  .sidebar a { display: block; color: rgba(255,255,255,0.8); padding: 12px 20px; text-decoration: none; font-size: 14px; transition: all 0.2s; border-left: 3px solid transparent; }
  .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.08); color: #fff; border-left-color: #3498db; }
  .main { flex: 1; padding: 24px; overflow-x: auto; }
  .page-header { margin-bottom: 24px; }
  .page-header h2 { font-size: 22px; color: #2c3e50; }
  .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .btn { display: inline-block; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #3498db; color: #fff; }
  .btn-success { background: #27ae60; color: #fff; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #2c3e50; color: #fff; padding: 10px 12px; text-align: left; font-size: 13px; }
  td { padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
  tr:hover td { background: #f8f9fa; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  .badge-smoke { background: #d5f5e3; color: #27ae60; }
  .badge-negative { background: #fadbd8; color: #e74c3c; }
  .badge-positive { background: #d6eaf8; color: #2980b9; }
  .badge-structure { background: #fdebd0; color: #e67e22; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; }
  .modal h3 { margin-bottom: 16px; color: #2c3e50; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: bold; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; }
  .form-group textarea { font-family: Menlo, monospace; font-size: 12px; min-height: 60px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 2000; display: none; }
  .toast.success { background: #27ae60; }
  .toast.error { background: #e74c3c; }
  .toast.show { display: block; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  iframe.report-frame { width: 100%; height: 80vh; border: none; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #fff; border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .stat-card .num { font-size: 28px; font-weight: bold; color: #2c3e50; }
  .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
  .running-indicator { display: none; align-items: center; gap: 8px; padding: 10px 16px; background: #fff3cd; border-radius: 8px; margin-bottom: 16px; }
  .running-indicator.show { display: flex; }
  .spinner { width: 18px; height: 18px; border: 2px solid #f39c12; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">自动化测试平台</div>
  <a href="/" class="{% if request.path == '/' %}active{% endif %}">仪表盘</a>
  <a href="/testcases" class="{% if request.path.startswith('/testcases') %}active{% endif %}">用例管理</a>
  <a href="/reports" class="{% if request.path.startswith('/reports') %}active{% endif %}">历史报告</a>
</div>
<div class="main">
  {% block content %}{% endblock %}
</div>
<div id="toast" class="toast"></div>
<script>
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
  }
  async function api(url, opts = {}) {
    const res = await fetch(url, { headers: {'Content-Type': 'application/json'}, ...opts });
    return res.json();
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
