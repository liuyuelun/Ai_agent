{% extends "base.html" %}
{% block title %}仪表盘 - 自动化测试平台{% endblock %}
{% block content %}
<div class="page-header"><h2>仪表盘</h2></div>

<div class="stats" id="stats"></div>

<div class="card">
  <h3 style="margin-bottom:12px;color:#2c3e50;">快捷操作</h3>
  <a href="/testcases" class="btn btn-primary">管理用例</a>
  <button class="btn btn-success" onclick="runAll()">执行全部用例</button>
  <button class="btn btn-primary" onclick="importExcel()" style="background:#8e44ad;">从 Excel 导入</button>
  <a href="/api/testcases/template" class="btn btn-primary" style="background:#17a2b8;">下载 Excel 模版</a>
</div>

<div class="card">
  <h3 style="margin-bottom:12px;color:#2c3e50;">最近执行记录</h3>
  <div id="recentRuns"><p style="color:#888;">加载中...</p></div>
</div>

<div id="runningBar" class="running-indicator">
  <div class="spinner"></div> <span>测试执行中，请稍候...</span>
</div>
{% endblock %}

{% block scripts %}
<script>
  async function loadDashboard() {
    // 统计
    const cases = await api('/api/testcases');
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="num">${cases.length}</div><div class="label">总用例数</div></div>
    `;
    // 最近执行
    const runs = await api('/api/reports');
    const div = document.getElementById('recentRuns');
    if (!runs.length) { div.innerHTML = '<p style="color:#888;">暂无执行记录</p>'; return; }
    div.innerHTML = `<table>
      <tr><th>ID</th><th>时间</th><th>通过</th><th>失败</th><th>跳过</th><th>耗时</th><th>报告</th></tr>
      ${runs.slice(0,8).map(r => `
        <tr>
          <td>#${r.id}</td><td>${r.created_at}</td>
          <td style="color:#27ae60;">${r.passed}</td>
          <td style="color:${r.failed>0?'#e74c3c':'#888'};">${r.failed}</td>
          <td>${r.skipped}</td>
          <td>${r.duration?.toFixed(1)}s</td>
          <td><a href="/reports/${r.report_filename}" target="_blank">查看</a></td>
        </tr>
      `).join('')}
    </table>`;
  }

  async function runAll() {
    if (!confirm('确定执行全部用例吗？')) return;
    document.getElementById('runningBar').classList.add('show');
    try {
      const res = await api('/api/run', { method: 'POST', body: JSON.stringify({case_ids:[]}) });
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast(`执行完成: ${res.passed}通过 ${res.failed}失败 ${res.skipped}跳过`, res.failed>0?'error':'success');
      if (res.report_url) window.open(res.report_url, '_blank');
      loadDashboard();
    } finally {
      document.getElementById('runningBar').classList.remove('show');
    }
  }

  async function importExcel() {
    const filename = prompt('Excel 文件名（testdata/ 目录下）:', 'login_cases.xlsx');
    if (!filename) return;
    const res = await api('/api/testcases/import', { method: 'POST', body: JSON.stringify({filename}) });
    if (res.error) { showToast(res.error, 'error'); return; }
    showToast(`导入完成: 新增${res.imported}条, 跳过${res.skipped}条`, 'success');
    loadDashboard();
  }

  loadDashboard();
</script>
{% endblock %}
